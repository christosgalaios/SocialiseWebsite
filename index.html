<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Socialise Events</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo { font-size: 3rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 1rem; }
    .logo span { color: #7c3aed; }
    .tagline { font-size: 1.2rem; color: #9ca3af; margin-bottom: 3rem; max-width: 500px; }
    .cta-btn {
      display: inline-block;
      background: #7c3aed;
      color: #fff;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 1rem 2.5rem;
      border-radius: 50px;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 4px 24px rgba(124,58,237,0.4);
    }
    .cta-btn:hover { background: #6d28d9; transform: translateY(-2px); }
    .footer { position: fixed; bottom: 1.5rem; color: #4b5563; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="logo">Social<span>ise</span></div>
  <p class="tagline">The social events platform. Discover, connect, and experience events around you.</p>
  <a href="https://app.socialiseevents.co.uk" class="cta-btn">Open the App</a>
  <p class="footer">2026 Socialise Events</p>
</body>
</html>
